<section class="connect">
  <div class="container">
    <p>Connect</p>
    <h2>Order your unique jewelry</h2>
    <p>We'd love to hear more details from you!</p>

    <div class="inform-shop">
      <svg class="inform-shop__icon" width="18" height="24">
        <use href="../img/symbol-defs.svg#icon-envelope"></use>
      </svg>
      <p>Email</p>
      <a href="mailto:info@handmadejewelry.com">info@handmadejewelry.com</a>
    </div>

    <div class="inform-shop-item">
      <svg class="inform-shop__icon" width="18" height="24">
        <use href="../img/symbol-defs.svg#icon-phone"></use>
      </svg>
      <p>Phone</p>
      <a href="tel:+15550000000">+1 (555) 000-0000</a>
    </div>

    <div class="inform-shop-item">
      <svg class="inform-shop__icon" width="18" height="24">
        <use href="../img/symbol-defs.svg#icon-map"></use>
      </svg>
      <p>Ofice</p>
      <!-- prettier-ignore -->
      <a href="https://goo.gl/maps/yourshoplocation" target="_blank"
        >76-8 Oakington Manor Dr, London, UK</a>
    </div>
    <!-- Feedback Form -->
    <form class="feedback-form" name="feedback-form">
      <div class="feedback-wrapper">
        <label class="feedback-label" for="userName">Name*</label>
        <div class="feedback-field">
          <input
            class="feedback-input"
            type="text"
            id="userName"
            name="userName"
            placeholder="Tony"
          />
          <svg class="feedback-icon" width="18" height="24">
            <use href="../img/symbol-defs.svg#icon-user"></use>
          </svg>
        </div>
      </div>

      <div class="feedback-wrapper">
        <label class="feedback-label" for="userPhone">Phone*</label>
        <div class="feedback-field">
          <input
            class="feedback-input"
            type="tel"
            id="userPhone"
            name="userPhone"
            placeholder="+1 234 567 8900"
          />
          <svg class="feedback-icon" width="18" height="24">
            <use href="./images/icons.svg#phone"></use>
          </svg>
        </div>
      </div>
      <!-- prettier-ignore -->
      <div class="feedback-wrapper-comment">
      <label class="feedback-label" for="userComment"
        >Describe what you want</label>
      <div class="feedback-field">
        <textarea
          class="comment-form"
          name="userComment"
          rows="6"
          placeholder="Type your message..."
          id="userComment"
        ></textarea>
      </div>
    </div>
      <button class="feedback-button" type="submit">Submit</button>
    </form>
  </div>
</section>
